openapi: "3.1.0"
info:
  title: Rent A Car API
  version: "1.0.0"
  description: |
    REST API for the Rent A Car system.
    All public endpoints are unauthenticated.
    Admin endpoints require a valid session cookie (POST /api/v1/admin/login first).

servers:
  - url: http://localhost:3001/api/v1
    description: Local development

tags:
  - name: Vehicles
  - name: Categories
  - name: Locations
  - name: Reservations
  - name: Media
  - name: Admin

paths:

  # ─── Public: Vehicles ───────────────────────────────────────────────────────

  /vehicles:
    get:
      summary: List available vehicles
      tags: [Vehicles]
      parameters:
        - name: category_slug
          in: query
          schema:
            type: string
          description: Filter by category slug
        - name: status
          in: query
          schema:
            type: string
            enum: [available, rented, maintenance]
          description: Filter by status (default available)
        - name: page
          in: query
          schema:
            type: integer
            default: 1
        - name: limit
          in: query
          schema:
            type: integer
            default: 20
            maximum: 100
      responses:
        "200":
          description: Paginated list of vehicles
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/VehicleListResponse"

  /vehicles/{slug}:
    get:
      summary: Get vehicle detail by slug
      tags: [Vehicles]
      parameters:
        - name: slug
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Vehicle detail
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/VehicleDetail"
        "404":
          $ref: "#/components/responses/NotFound"

  # ─── Public: Categories ─────────────────────────────────────────────────────

  /categories:
    get:
      summary: List all categories
      tags: [Categories]
      responses:
        "200":
          description: Array of categories
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: "#/components/schemas/Category"

  # ─── Public: Locations ──────────────────────────────────────────────────────

  /locations:
    get:
      summary: List active locations
      tags: [Locations]
      responses:
        "200":
          description: Array of locations
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: "#/components/schemas/Location"

  # ─── Public: Reservations ───────────────────────────────────────────────────

  /reservations:
    post:
      summary: Submit a reservation request
      tags: [Reservations]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ReservationRequest"
      responses:
        "201":
          description: Reservation created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ReservationCreated"
        "422":
          $ref: "#/components/responses/ValidationError"

  # ─── Admin: Auth ────────────────────────────────────────────────────────────

  /admin/login:
    post:
      summary: Admin login
      tags: [Admin]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [username, password]
              properties:
                username:
                  type: string
                password:
                  type: string
      responses:
        "200":
          description: Login successful; sets session cookie
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: Login successful
        "401":
          $ref: "#/components/responses/Unauthorized"

  /admin/logout:
    delete:
      summary: Admin logout
      tags: [Admin]
      responses:
        "204":
          description: Session destroyed

  # ─── Admin: Vehicles ────────────────────────────────────────────────────────

  /admin/vehicles:
    get:
      summary: List all vehicles (admin)
      tags: [Admin]
      security:
        - cookieAuth: []
      parameters:
        - name: status
          in: query
          schema:
            type: string
        - name: category_slug
          in: query
          schema:
            type: string
        - name: page
          in: query
          schema:
            type: integer
            default: 1
        - name: limit
          in: query
          schema:
            type: integer
            default: 50
      responses:
        "200":
          description: Paginated vehicle list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/VehicleListResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"

    post:
      summary: Create a vehicle
      tags: [Admin]
      security:
        - cookieAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/VehicleWrite"
      responses:
        "201":
          description: Vehicle created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/VehicleDetail"
        "422":
          $ref: "#/components/responses/ValidationError"

  /admin/vehicles/{id}:
    put:
      summary: Update a vehicle
      tags: [Admin]
      security:
        - cookieAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/VehicleWrite"
      responses:
        "200":
          description: Updated vehicle
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/VehicleDetail"
        "404":
          $ref: "#/components/responses/NotFound"

    delete:
      summary: Soft-delete a vehicle (sets status to inactive)
      tags: [Admin]
      security:
        - cookieAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Vehicle deactivated
        "404":
          $ref: "#/components/responses/NotFound"

  /admin/vehicles/{id}/media:
    post:
      summary: Upload image(s) for a vehicle
      tags: [Media]
      security:
        - cookieAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              properties:
                files:
                  type: array
                  items:
                    type: string
                    format: binary
      responses:
        "201":
          description: Media uploaded
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: "#/components/schemas/Media"

  /admin/vehicles/{id}/media/{mediaId}:
    delete:
      summary: Delete a vehicle image
      tags: [Media]
      security:
        - cookieAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
        - name: mediaId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Media deleted

  # ─── Admin: Categories ──────────────────────────────────────────────────────

  /admin/categories:
    get:
      summary: List categories (admin)
      tags: [Admin]
      security:
        - cookieAuth: []
      responses:
        "200":
          description: Category list
    post:
      summary: Create category
      tags: [Admin]
      security:
        - cookieAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CategoryWrite"
      responses:
        "201":
          description: Category created

  /admin/categories/{id}:
    put:
      summary: Update category
      tags: [Admin]
      security:
        - cookieAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CategoryWrite"
      responses:
        "200":
          description: Updated category

    delete:
      summary: Delete category
      tags: [Admin]
      security:
        - cookieAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted
        "409":
          description: Cannot delete category with existing vehicles

  # ─── Admin: Reservations ────────────────────────────────────────────────────

  /admin/reservations:
    get:
      summary: List all reservations
      tags: [Admin]
      security:
        - cookieAuth: []
      parameters:
        - name: status
          in: query
          schema:
            type: string
            enum: [pending, confirmed, cancelled, completed]
        - name: page
          in: query
          schema:
            type: integer
            default: 1
        - name: limit
          in: query
          schema:
            type: integer
            default: 50
      responses:
        "200":
          description: Paginated reservation list

  /admin/reservations/{id}:
    get:
      summary: Get reservation detail
      tags: [Admin]
      security:
        - cookieAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Reservation detail
        "404":
          $ref: "#/components/responses/NotFound"

    put:
      summary: Update reservation status / admin notes
      tags: [Admin]
      security:
        - cookieAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                status:
                  type: string
                  enum: [pending, confirmed, cancelled, completed]
                admin_notes:
                  type: string
      responses:
        "200":
          description: Updated reservation

  # ─── Admin: Locations ───────────────────────────────────────────────────────

  /admin/locations:
    get:
      summary: List all locations (admin)
      tags: [Admin]
      security:
        - cookieAuth: []
      responses:
        "200":
          description: Location list
    post:
      summary: Create location
      tags: [Admin]
      security:
        - cookieAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LocationWrite"
      responses:
        "201":
          description: Location created

  /admin/locations/{id}:
    put:
      summary: Update location
      tags: [Admin]
      security:
        - cookieAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LocationWrite"
      responses:
        "200":
          description: Updated location

    delete:
      summary: Deactivate location
      tags: [Admin]
      security:
        - cookieAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Location deactivated

# ─── Components ───────────────────────────────────────────────────────────────

components:
  securitySchemes:
    cookieAuth:
      type: apiKey
      in: cookie
      name: connect.sid

  responses:
    NotFound:
      description: Resource not found
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Error"
    Unauthorized:
      description: Authentication required
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Error"
    ValidationError:
      description: Validation failed
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Error"

  schemas:

    Error:
      type: object
      required: [success, error]
      properties:
        success:
          type: boolean
          example: false
        error:
          type: object
          required: [code, message]
          properties:
            code:
              type: string
              example: VALIDATION_ERROR
            message:
              type: string
              example: Pickup date must be today or in the future
            details:
              type: array
              items:
                type: object
                properties:
                  field:
                    type: string
                  message:
                    type: string

    Category:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        slug:
          type: string
        image_url:
          type: string
          nullable: true
        vehicle_count:
          type: integer

    CategoryWrite:
      type: object
      required: [name]
      properties:
        name:
          type: string
        image_url:
          type: string
          nullable: true

    Location:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        address:
          type: string
        city:
          type: string
        phone:
          type: string
          nullable: true
        latitude:
          type: number
          nullable: true
        longitude:
          type: number
          nullable: true

    LocationWrite:
      type: object
      required: [name, address, city]
      properties:
        name:
          type: string
        address:
          type: string
        city:
          type: string
        phone:
          type: string
          nullable: true
        latitude:
          type: number
          nullable: true
        longitude:
          type: number
          nullable: true
        is_active:
          type: boolean

    Media:
      type: object
      properties:
        id:
          type: integer
        url:
          type: string
        display_order:
          type: integer

    VehicleSummary:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        slug:
          type: string
        daily_price:
          type: number
        status:
          type: string
        fuel_type:
          type: string
        transmission:
          type: string
        seat_count:
          type: integer
        year:
          type: integer
          nullable: true
        category:
          $ref: "#/components/schemas/Category"
        primary_image_url:
          type: string
          nullable: true

    VehicleDetail:
      allOf:
        - $ref: "#/components/schemas/VehicleSummary"
        - type: object
          properties:
            description:
              type: string
              nullable: true
            media:
              type: array
              items:
                $ref: "#/components/schemas/Media"

    VehicleWrite:
      type: object
      required: [name, category_id, daily_price, fuel_type, transmission, seat_count]
      properties:
        name:
          type: string
        category_id:
          type: integer
        description:
          type: string
          nullable: true
        daily_price:
          type: number
        fuel_type:
          type: string
          enum: [petrol, diesel, hybrid, electric]
        transmission:
          type: string
          enum: [manual, automatic]
        seat_count:
          type: integer
          minimum: 2
          maximum: 9
        year:
          type: integer
          nullable: true
        status:
          type: string
          enum: [available, rented, maintenance, inactive]

    VehicleListResponse:
      type: object
      properties:
        success:
          type: boolean
          example: true
        data:
          type: array
          items:
            $ref: "#/components/schemas/VehicleSummary"
        pagination:
          type: object
          properties:
            page:
              type: integer
            limit:
              type: integer
            total:
              type: integer
            total_pages:
              type: integer

    ReservationRequest:
      type: object
      required:
        - vehicle_id
        - first_name
        - last_name
        - email
        - phone
        - pickup_location_id
        - return_location_id
        - pickup_date
        - return_date
      properties:
        vehicle_id:
          type: integer
        first_name:
          type: string
        last_name:
          type: string
        email:
          type: string
          format: email
        phone:
          type: string
        pickup_location_id:
          type: integer
        return_location_id:
          type: integer
        pickup_date:
          type: string
          format: date
        return_date:
          type: string
          format: date
        notes:
          type: string
          nullable: true

    ReservationCreated:
      type: object
      properties:
        success:
          type: boolean
          example: true
        data:
          type: object
          properties:
            id:
              type: integer
            reference_number:
              type: string
              example: RAC-20260618-0001
            status:
              type: string
              example: pending
            total_price:
              type: number
            rental_days:
              type: integer
